<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Potato Disease Detection - LeafScan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <style>
      body {
        background: linear-gradient(to right, #8e9eab, #eef2f3);
        min-height: 100vh;
      }
      .card {
        border-radius: 15px;
      }
      .container {
        margin-top: 50px;
      }
      .btn {
        background-color: #5c6bc0;
        color: white;
      }
      .btn:hover {
        background-color: #3f4e9d;
      }
    </style>
  </head>
  <body>

    <div class="container">
      <h1 class="text-center mt-5">Potato Disease Detection</h1>
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="card p-4 mt-4">
            <h3 class="text-center">Image Upload and Prediction</h3>

            <!-- Form for File Upload -->
            <form action="/" method="post" enctype="multipart/form-data" class="mb-4" id="uploadForm">
              <div class="mb-3">
                <label for="fileInput" class="form-label">Choose an image file:</label>
                <input type="file" id="fileInput" name="file" accept=".jpg, .jpeg, .png" class="form-control" required>
              </div>
              <button type="submit" class="btn w-100">Predict</button>
            </form>

            <!-- Display Messages -->
            {% if message %}
              <p class="text-danger text-center">{{ message }}</p>
            {% endif %}

            <!-- Prediction Result Display -->
            {% if image_path %}
              <hr>
              <h4 class="text-center">Prediction Results</h4>
              <div class="text-center">
                <img src="{{ image_path }}" alt="Uploaded Image" class="img-fluid rounded mb-3" style="max-height: 300px;">
                <p><strong>Actual Label:</strong> {{ actual_label }}</p>
                <p><strong>Predicted Label:</strong> {{ predicted_label }}</p>
                <p><strong>Confidence:</strong> {{ confidence }}%</p>
              </div>
            {% endif %}
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script>
      // Prevent form submission if no file is selected
      document.getElementById('uploadForm').addEventListener('submit', function(e) {
        const fileInput = document.getElementById('fileInput');
        if (!fileInput.files.length) {
          alert('Please select a file to upload.');
          e.preventDefault();
        }
      });
    </script>
  </body>
</html>
